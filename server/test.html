<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Search — Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e0e;
      --surface:  #181818;
      --border:   #2a2a2a;
      --text:     #e8e8e8;
      --muted:    #666;
      --accent:   #c8f135;
      --danger:   #ff4d4d;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header span {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    #server-status {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    #status-dot.ok  { background: var(--accent); }
    #status-dot.err { background: var(--danger); }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── Left panel ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* File picker */
    #drop-zone {
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200, 241, 53, 0.04);
    }

    #drop-zone p {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    #drop-zone strong {
      color: var(--accent);
      font-weight: 500;
    }

    #file-input { display: none; }

    /* Server URL */
    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.5rem 0.7rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }

    /* Submit button */
    #submit-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #submit-btn:hover:not(:disabled) { opacity: 0.88; }
    #submit-btn:active:not(:disabled) { transform: scale(0.98); }
    #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Stats */
    #stats {
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 2;
      color: var(--muted);
    }

    #stats b { color: var(--text); font-weight: 500; }

    /* Progress */
    #progress-wrap {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
    }

    #progress-wrap.visible { display: flex; }

    #progress-bar-bg {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    #progress-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Right panel ── */
    #canvas-area {
      position: relative;
      overflow: auto;
      background:
        radial-gradient(circle at 20px 20px, #1e1e1e 1px, transparent 0) 0 0 / 40px 40px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2rem;
    }

    #canvas-wrap {
      position: relative;
      display: inline-block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #preview-img {
      display: block;
      max-width: 100%;
    }

    #overlay-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--muted);
    }

    #empty-state svg { opacity: 0.2; }

    #empty-state p {
      font-family: var(--mono);
      font-size: 0.75rem;
      opacity: 0.5;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.3rem 0.6rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }
  </style>
</head>
<body>

<header>
  <h1>Visual Search</h1>
  <span>segment test</span>
  <div id="server-status">
    <div id="status-dot"></div>
    <span id="status-label">checking…</span>
  </div>
</header>

<main>
  <aside>
    <div>
      <div class="section-label">Image</div>
      <div id="drop-zone">
        <input type="file" id="file-input" accept="image/*">
        <p><strong>Click to open</strong> or drop an image here</p>
      </div>
    </div>

    <div class="field">
      <label>Server URL</label>
      <input type="text" id="server-url" value="http://localhost:7771">
    </div>

    <button id="submit-btn" disabled>Post to /index-image</button>

    <div id="progress-wrap">
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="progress-label">Processing…</div>
    </div>

    <div id="stats"></div>
  </aside>

  <div id="canvas-area">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>No image loaded</p>
    </div>
    <div id="canvas-wrap" style="display:none">
      <img id="preview-img" alt="Preview">
      <canvas id="overlay-canvas"></canvas>
    </div>
  </div>
</main>

<div id="tooltip"></div>

<script>
  // ── Elements ────────────────────────────────────────────────────────────────
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const serverUrl   = document.getElementById('server-url');
  const submitBtn   = document.getElementById('submit-btn');
  const progressWrap= document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const statsEl     = document.getElementById('stats');
  const emptyState  = document.getElementById('empty-state');
  const canvasWrap  = document.getElementById('canvas-wrap');
  const previewImg  = document.getElementById('preview-img');
  const overlayCanvas = document.getElementById('overlay-canvas');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const tooltip     = document.getElementById('tooltip');
  const ctx         = overlayCanvas.getContext('2d');

  let currentFile = null;
  let lastSegments = [];

  // ── Health check ────────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${serverUrl.value}/health`);
      const data = await res.json();
      statusDot.className = 'ok';
      statusLabel.textContent = `${data.clip_model} · ready`;
    } catch {
      statusDot.className = 'err';
      statusLabel.textContent = 'server unreachable';
    }
  }

  checkHealth();
  serverUrl.addEventListener('change', checkHealth);

  // ── File pick / drop ────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    currentFile = file;
    lastSegments = [];
    statsEl.innerHTML = '';

    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewImg.onload = () => {
      overlayCanvas.width  = previewImg.naturalWidth;
      overlayCanvas.height = previewImg.naturalHeight;
      overlayCanvas.style.width  = previewImg.width  + 'px';
      overlayCanvas.style.height = previewImg.height + 'px';
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      emptyState.style.display = 'none';
      canvasWrap.style.display = 'inline-block';
    };

    submitBtn.disabled = false;
    dropZone.querySelector('p').innerHTML = `<strong>${file.name}</strong><br>${(file.size / 1024).toFixed(0)} KB`;
  }

  // ── Submit ──────────────────────────────────────────────────────────────────
  submitBtn.addEventListener('click', async () => {
    if (!currentFile) return;

    submitBtn.disabled = true;
    lastSegments = [];
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    statsEl.innerHTML = '';

    progressWrap.classList.add('visible');
    progressBar.style.width = '0%';
    progressLbl.textContent = 'Uploading…';

    // Fake upload progress (XHR gives us real upload events; fetch doesn't)
    let fakeProgress = 0;
    const ticker = setInterval(() => {
      fakeProgress = Math.min(fakeProgress + Math.random() * 8, 85);
      progressBar.style.width = fakeProgress + '%';
      if (fakeProgress > 30) progressLbl.textContent = 'Processing on server…';
    }, 300);

    const t0 = performance.now();

    try {
      const form = new FormData();
      form.append('file', currentFile, currentFile.name);

      const res = await fetch(`${serverUrl.value}/index-image`, {
        method: 'POST',
        body: form,
      });

      clearInterval(ticker);

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`HTTP ${res.status}: ${err}`);
      }

      progressBar.style.width = '100%';
      progressLbl.textContent = 'Drawing segments…';

      const data = await res.json();
      const clientMs = performance.now() - t0;

      console.log('[visual-search] /index-image response:', data);

      lastSegments = data.segments;
      drawSegments(data.segments, data.image_width, data.image_height);
      showStats(data, clientMs);

    } catch (err) {
      clearInterval(ticker);
      progressLbl.textContent = `Error: ${err.message}`;
      progressBar.style.background = 'var(--danger)';
      console.error('[visual-search] Error:', err);
    } finally {
      submitBtn.disabled = false;
      setTimeout(() => {
        progressWrap.classList.remove('visible');
        progressBar.style.background = '';
        progressBar.style.width = '0%';
      }, 1500);
    }
  });

  // ── Draw segments ───────────────────────────────────────────────────────────
  function drawSegments(segments, imgW, imgH) {
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    segments.forEach((seg, i) => {
      const [nx, ny, nw, nh] = seg.bbox;
      const x = nx * imgW;
      const y = ny * imgH;
      const w = nw * imgW;
      const h = nh * imgH;

      const hue = (i * 47) % 360; // spread hues across segments
      ctx.strokeStyle = `hsla(${hue}, 90%, 65%, 0.9)`;
      ctx.lineWidth = Math.max(1, imgW / 800); // scale stroke to image size
      ctx.fillStyle = `hsla(${hue}, 90%, 65%, 0.08)`;

      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.fill();
      ctx.stroke();

      // Index label
      const fontSize = Math.max(10, imgW / 80);
      ctx.font = `${fontSize}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = `hsla(${hue}, 90%, 65%, 0.95)`;
      ctx.fillText(i, x + 4, y + fontSize + 2);
    });
  }

  // ── Tooltip on hover ────────────────────────────────────────────────────────
  overlayCanvas.style.pointerEvents = 'auto';
  overlayCanvas.addEventListener('mousemove', e => {
    if (!lastSegments.length) return;

    const rect = overlayCanvas.getBoundingClientRect();
    const scaleX = overlayCanvas.width  / rect.width;
    const scaleY = overlayCanvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top)  * scaleY;

    const W = overlayCanvas.width;
    const H = overlayCanvas.height;

    // Find the smallest segment under the cursor (prefer tighter boxes)
    let hit = null;
    for (let i = 0; i < lastSegments.length; i++) {
      const [nx, ny, nw, nh] = lastSegments[i].bbox;
      const x = nx * W, y = ny * H, w = nw * W, h = nh * H;
      if (mx >= x && mx <= x + w && my >= y && my <= y + h) {
        if (!hit || lastSegments[i].area < hit.area) hit = { ...lastSegments[i], index: i };
      }
    }

    if (hit) {
      tooltip.style.opacity = '1';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top  = (e.clientY + 12) + 'px';
      tooltip.textContent = `#${hit.index} · area ${(hit.area * 100).toFixed(1)}%`;
    } else {
      tooltip.style.opacity = '0';
    }
  });

  overlayCanvas.addEventListener('mouseleave', () => tooltip.style.opacity = '0');

  // ── Stats panel ─────────────────────────────────────────────────────────────
  function showStats(data, clientMs) {
    statsEl.innerHTML = `
      <div><b>${data.segments.length}</b> segments</div>
      <div><b>${data.image_width} × ${data.image_height}</b> px</div>
      <div>server <b>${(data.processing_ms / 1000).toFixed(2)}s</b></div>
      <div>total  <b>${(clientMs / 1000).toFixed(2)}s</b></div>
    `;
  }
</script>
</body>
</html>
